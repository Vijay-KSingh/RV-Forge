version: "3.9"
name: {{APP_SLUG}}

# All services in one compose project = one cluster, single network.
# Start together, stop together.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: {{APP_SLUG}}-backend
    environment:
      APP_NAME: "{{APP_NAME}}"
      LOG_LEVEL: INFO
      OBS_TIER: "{{OBS_TIER}}"
    ports:
      - "8000:8000"
    networks: [appnet]
    depends_on: [postgres]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: {{APP_SLUG}}-frontend
    ports:
      - "3000:80"
    networks: [appnet]
    depends_on: [backend]

  postgres:
    image: postgres:16-alpine
    container_name: {{APP_SLUG}}-postgres
    environment:
      POSTGRES_DB: {{APP_SLUG}}
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_dev_pwd_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [appnet]

  prometheus:
    image: prom/prometheus:latest
    container_name: {{APP_SLUG}}-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [appnet]

  grafana:
    image: grafana/grafana:latest
    container_name: {{APP_SLUG}}-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks: [appnet]
    depends_on: [prometheus]

  loki:
    image: grafana/loki:latest
    container_name: {{APP_SLUG}}-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
  grafana-data:
