<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge — Multi-source Data Fabric</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --panel:#111726; --panel-2:#161d2f; --border:#1f2940;
  --text:#e7ebf5; --text-dim:#8b95ac; --text-muted:#5e6884;
  --accent:#6ce5b1; --accent-2:#9d8df1; --warn:#f5b76d; --bad:#ef6079;
  --mysql:#f5b76d; --postgresql:#6ea8fe; --mongodb:#6ce5b1;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
code,pre,.mono{font-family:'JetBrains Mono',monospace;}
a{color:var(--accent);}
.top{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,14,26,.85);backdrop-filter:blur(8px);z-index:10;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;}
.brand-mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#0a0e1a;font-weight:800;font-size:13px;}
.brand-tag{color:var(--text-dim);font-weight:400;font-size:12px;}
.wrap{display:grid;grid-template-columns:300px 1fr;gap:22px;max-width:1200px;margin:26px auto;padding:0 22px;}
@media(max-width:880px){.wrap{grid-template-columns:1fr;}}
h1{font-size:22px;letter-spacing:-.02em;margin-bottom:4px;}
.sub{color:var(--text-dim);margin-bottom:20px;font-size:13px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px;}
h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:12px;}
/* sources */
.src{border:1px solid var(--border);border-radius:9px;padding:12px 13px;margin-bottom:10px;background:var(--panel-2);}
.src-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.src-name{font-weight:600;}
.eng{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:999px;}
.eng.mysql{background:rgba(245,183,109,.16);color:var(--mysql);}
.eng.postgresql{background:rgba(110,168,254,.16);color:var(--postgresql);}
.eng.mongodb{background:rgba(108,229,177,.16);color:var(--mongodb);}
.src-conn{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-muted);margin-top:6px;word-break:break-all;}
.src-tables{font-size:11px;color:var(--text-dim);margin-top:8px;}
.src-tables span{display:inline-block;margin-right:8px;}
/* ask */
.ask{display:flex;gap:8px;}
.ask input{flex:1;padding:12px 14px;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;}
.ask input:focus{outline:none;border-color:var(--accent);}
.ask button{padding:12px 20px;background:var(--accent);color:#08130d;border:none;border-radius:9px;font-weight:600;cursor:pointer;}
.ask button:disabled{opacity:.5;cursor:not-allowed;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.chip{font-size:12px;padding:6px 11px;border:1px solid var(--border);border-radius:999px;background:var(--panel-2);color:var(--text-dim);cursor:pointer;transition:.12s;}
.chip:hover{border-color:var(--accent);color:var(--text);}
/* result */
.route{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
.route .to{font-size:13px;color:var(--text-dim);}
.badge{font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;}
.badge.mysql{background:rgba(245,183,109,.16);color:var(--mysql);}
.badge.postgresql{background:rgba(110,168,254,.16);color:var(--postgresql);}
.badge.mongodb{background:rgba(108,229,177,.16);color:var(--mongodb);}
.conf{font-size:12px;color:var(--text-muted);}
.explain{color:var(--text-dim);font-size:13px;margin:10px 0;}
.cands{display:flex;flex-direction:column;gap:5px;margin:12px 0;}
.cand{display:grid;grid-template-columns:90px 1fr 30px;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);}
.cand-bar{height:7px;background:var(--panel-2);border-radius:99px;overflow:hidden;}
.cand-bar>div{height:100%;background:var(--accent-2);border-radius:99px;}
.cand.win .cand-bar>div{background:var(--accent);}
.cand.win{color:var(--text);}
pre.query{background:#0c1220;border:1px solid var(--border);border-radius:9px;padding:12px 14px;font-size:12px;color:#b9c4dc;overflow:auto;margin:12px 0;white-space:pre-wrap;}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:9px;max-height:420px;}
table{border-collapse:collapse;width:100%;font-size:12.5px;}
th,td{padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
thead th{position:sticky;top:0;background:var(--panel-2);color:var(--text-dim);font-weight:600;}
tbody tr:hover{background:var(--panel-2);}
.meta{color:var(--text-muted);font-size:12px;margin-top:8px;}
.err{color:var(--bad);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--text-muted);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;}
@keyframes sp{to{transform:rotate(360deg);}}
.empty{color:var(--text-muted);text-align:center;padding:40px 0;}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><div class="brand-mark">F</div><span>Forge</span>
    <span class="brand-tag">— multi-source data fabric</span></div>
  <a href="/" style="font-size:12px;">← Wizard</a>
</div>

<div class="wrap">
  <aside>
    <h3>Connected sources</h3>
    <div id="sources"><div class="empty"><span class="spin"></span></div></div>
  </aside>

  <main>
    <h1>Ask across your data</h1>
    <div class="sub">Type a question. The agent decides <em>which</em> database to connect to
      (Postgres, MySQL, or MongoDB), runs the query, and returns the rows.</div>

    <div class="card">
      <div class="ask">
        <input id="q" placeholder="e.g. What are our top selling products?" autofocus />
        <button id="go">Ask</button>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <div id="result"></div>
  </main>
</div>

<script>
const EXAMPLES = [
  "What are our top selling products?",
  "Show revenue by region",
  "List all flagged transfers",
  "How many patients are in each department?",
  "What is our total revenue?",
  "Which accounts have pending KYC?",
  "Average treatment cost by department",
  "Show me low stock inventory",
  "Top expense categories this year",
  "Largest bank transfers",
];

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

async function loadSources(){
  try{
    const r = await fetch('/api/fabric/sources'); const d = await r.json();
    document.getElementById('sources').innerHTML = d.sources.map(s=>{
      const tables = Object.entries(s.tables).map(([t,info])=>
        `<span>${esc(t)} <b style="color:var(--text-dim)">${info.rows}</b></span>`).join('');
      return `<div class="src">
        <div class="src-head"><span class="src-name">${esc(s.domain)}</span>
          <span class="eng ${esc(s.engine)}">${esc(s.engine)}</span></div>
        <div class="src-conn">${esc(s.connection)}</div>
        <div class="src-tables">${tables} · <b>${s.total_rows}</b> rows</div>
      </div>`;
    }).join('');
  }catch(e){ document.getElementById('sources').innerHTML = '<div class="err">Could not load sources</div>'; }
}

function renderResult(d){
  const cands = d.candidates.map(c=>{
    const max = Math.max(1, ...d.candidates.map(x=>x.score));
    const win = c.domain === d.source;
    return `<div class="cand ${win?'win':''}">
      <span>${esc(c.domain)}</span>
      <span class="cand-bar"><div style="width:${(c.score/max)*100}%"></div></span>
      <span>${c.score}</span></div>`;
  }).join('');

  const table = d.rows.length ? `
    <div class="table-wrap"><table>
      <thead><tr>${d.columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${d.rows.map(r=>`<tr>${r.map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>` : '<div class="empty">No rows returned</div>';

  document.getElementById('result').innerHTML = `
    <div class="card">
      <div class="route">
        <span class="to">Agent routed to</span>
        <span class="badge ${esc(d.engine)}">${esc(d.engine)} · ${esc(d.domain)}</span>
        <span class="conf">${d.fallback ? 'no strong match (default)' : d.confidence + '% confidence'}</span>
      </div>
      <div class="explain">${esc(d.explanation)}</div>
      <div class="cands">${cands}</div>
      <h3 style="margin-top:16px">Query executed · intent: ${esc(d.intent)}</h3>
      <pre class="query">${esc(d.query)}</pre>
      <h3>Result · ${d.row_count} row(s)${d.truncated ? ' (showing first '+d.rows.length+')' : ''}</h3>
      ${table}
      <div class="meta">Connected to <code>${esc(d.connection)}</code></div>
    </div>`;
}

async function ask(q){
  const input = document.getElementById('q'); input.value = q;
  const btn = document.getElementById('go'); btn.disabled = true;
  document.getElementById('result').innerHTML = '<div class="card"><span class="spin"></span> Routing & querying…</div>';
  try{
    const r = await fetch('/api/fabric/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    if(!r.ok){ throw new Error((await r.json()).detail || r.status); }
    renderResult(await r.json());
  }catch(e){ document.getElementById('result').innerHTML = `<div class="card err">Error: ${esc(e.message)}</div>`; }
  finally{ btn.disabled = false; }
}

document.getElementById('chips').innerHTML = EXAMPLES.map(e=>`<span class="chip">${esc(e)}</span>`).join('');
document.getElementById('chips').addEventListener('click', e=>{ if(e.target.classList.contains('chip')) ask(e.target.textContent); });
document.getElementById('go').addEventListener('click', ()=>{ const q=document.getElementById('q').value.trim(); if(q) ask(q); });
document.getElementById('q').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const q=e.target.value.trim(); if(q) ask(q); }});

loadSources();
</script>
</body>
</html>
