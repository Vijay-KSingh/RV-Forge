<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge — generate analytics applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --panel:#111726;
  --panel-2:#161d2f;
  --border:#1f2940;
  --text:#e7ebf5;
  --text-dim:#8b95ac;
  --text-muted:#5e6884;
  --accent:#6ce5b1;
  --accent-2:#9d8df1;
  --warn:#f5b76d;
  --bad:#ef6079;
  --ok:#6ce5b1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}
code,pre,.mono{font-family:'JetBrains Mono',monospace;}
a{color:var(--accent);}

/* Layout */
.app{min-height:100vh;display:flex;flex-direction:column;}
.top{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(17,23,38,0.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-0.01em;}
.brand-mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#0a0e1a;font-weight:800;font-size:13px;}
.brand-tag{color:var(--text-dim);font-weight:400;font-size:12px;margin-left:4px;}
.top-actions{display:flex;gap:10px;align-items:center;color:var(--text-muted);font-size:12px;}

/* Wizard shell */
.shell{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;}
@media (max-width:900px){.shell{grid-template-columns:1fr;}}

.sidebar{border-right:1px solid var(--border);padding:24px 20px;background:rgba(17,23,38,0.4);}
.sidebar h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:14px;}
.steplist{display:flex;flex-direction:column;gap:2px;}
.step{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;cursor:pointer;color:var(--text-dim);font-size:13px;}
.step:hover{background:var(--panel-2);}
.step.active{background:rgba(108,229,177,0.08);color:var(--text);}
.step.done{color:var(--text-dim);}
.step.done .num{background:var(--accent);color:#0a0e1a;}
.step.active .num{background:var(--accent-2);color:#0a0e1a;}
.num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-dim);flex-shrink:0;}
.step.done .num::before{content:'✓';font-size:13px;}
.step.done .num{font-size:0;}

.main{padding:36px 48px;overflow-y:auto;max-width:920px;width:100%;}
@media (max-width:900px){.main{padding:24px;}}
.step-header{margin-bottom:24px;}
.step-eyebrow{color:var(--accent);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.step-title{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
.step-desc{color:var(--text-dim);font-size:14px;max-width:640px;}

.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px;}
.card h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;}
.card .help{color:var(--text-muted);font-size:12px;margin-top:6px;}

/* Form controls */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:6px;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{min-height:80px;resize:vertical;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:600px){.row{grid-template-columns:1fr;}}

/* Capability chips */
.chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.chip{padding:14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--panel-2);transition:all .12s;}
.chip:hover{border-color:var(--text-muted);}
.chip.on{border-color:var(--accent);background:rgba(108,229,177,0.08);}
.chip-title{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;}
.chip-title .check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;}
.chip.on .check{background:var(--accent);border-color:var(--accent);color:#0a0e1a;}
.chip-desc{font-size:12px;color:var(--text-dim);margin-top:4px;}

/* KPI catalog */
.kpi-domain{margin-bottom:18px;}
.kpi-domain-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.kpi-domain-label .count{color:var(--text-muted);font-weight:400;font-size:11px;}
.kpi-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;}
.kpi-item{padding:10px 12px;background:var(--panel-2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;}
.kpi-item:hover{border-color:var(--text-muted);}
.kpi-item.on{border-color:var(--accent);background:rgba(108,229,177,0.08);}
.kpi-item-name{font-weight:500;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.kpi-item-formula{color:var(--text-muted);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kpi-item-meta{display:flex;gap:8px;margin-top:4px;font-size:10px;}
.kpi-tag{padding:1px 6px;border-radius:3px;background:var(--border);color:var(--text-dim);}

/* Data sources */
.ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px;}
.ds-tile{padding:12px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:12px;}
.ds-tile:hover{border-color:var(--text-muted);}
.ds-tile.on{border-color:var(--accent);background:rgba(108,229,177,0.06);}
.ds-tile-name{font-weight:500;}
.ds-tile-auth{color:var(--text-muted);font-size:10px;margin-top:2px;}

.ds-config{padding:14px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
.ds-config-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ds-config-head .name{font-weight:600;}
.btn-x{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;}
.btn-x:hover{color:var(--bad);}

/* Roles + RBAC */
.role-card{padding:14px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
.role-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.policy-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;}
.policy-row input,.policy-row select{padding:6px 8px;font-size:12px;}

/* Buttons */
.btn{padding:10px 20px;border-radius:8px;border:1px solid transparent;cursor:pointer;font-weight:500;font-size:13px;transition:all .12s;}
.btn-primary{background:var(--accent);color:#0a0e1a;}
.btn-primary:hover{background:#5acca0;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-secondary{background:transparent;color:var(--text);border-color:var(--border);}
.btn-secondary:hover{border-color:var(--text-muted);}
.btn-link{background:transparent;color:var(--accent);padding:6px 10px;border:none;}
.btn-add{background:rgba(108,229,177,0.06);color:var(--accent);border:1px dashed var(--accent);padding:8px 14px;font-size:12px;}
.btn-add:hover{background:rgba(108,229,177,0.12);}

.actions{display:flex;justify-content:space-between;margin-top:32px;padding-top:20px;border-top:1px solid var(--border);}

/* Build console */
.build-console{background:#04060c;border:1px solid var(--border);border-radius:10px;padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px;min-height:340px;max-height:440px;overflow-y:auto;}
.build-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden;}
.build-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s;}
.build-line{padding:5px 0;color:var(--text-dim);display:flex;gap:10px;}
.build-line .stamp{color:var(--text-muted);min-width:90px;}
.build-line .lvl-ok{color:var(--accent);}
.build-line .lvl-error{color:var(--bad);}
.build-line .lvl-started{color:var(--text-dim);}

.review-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.review-tile{padding:14px;background:var(--panel-2);border:1px solid var(--border);border-radius:8px;}
.review-label{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.review-value{font-weight:600;font-size:14px;}

.divider{height:1px;background:var(--border);margin:20px 0;}

/* Insight preview */
.insight-card{background:linear-gradient(135deg,rgba(108,229,177,0.04),rgba(157,141,241,0.04));border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:14px;}
.insight-card h5{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.insight-bullets{list-style:none;}
.insight-bullets li{padding:6px 0;color:var(--text);border-bottom:1px solid rgba(255,255,255,0.04);}
.insight-bullets li:last-child{border-bottom:none;}

.banner{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;}
.banner-info{background:rgba(157,141,241,0.08);border:1px solid rgba(157,141,241,0.2);color:var(--text);}
.banner-warn{background:rgba(245,183,109,0.08);border:1px solid rgba(245,183,109,0.2);color:var(--text);}

/* Final */
.final{text-align:center;padding:40px 20px;}
.final h2{font-size:28px;margin-bottom:10px;}
.final .url-pill{display:inline-block;background:var(--panel-2);border:1px solid var(--border);padding:10px 16px;border-radius:8px;margin:14px 0;font-family:'JetBrains Mono',monospace;}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}

/* ── Live topology (post-build animated architecture view) ── */
.topo-wrap{margin-top:8px;background:radial-gradient(120% 120% at 50% 0%,rgba(108,229,177,0.04),transparent 60%),var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:18px;}
.topo-title{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.topo-svg{width:100%;height:auto;display:block;}
.flow-line{stroke:#26304a;stroke-width:2;fill:none;transition:stroke .4s ease;}
.flow-line.active{stroke:var(--accent);stroke-width:2.5;stroke-dasharray:5 7;animation:flowdash .7s linear infinite;filter:drop-shadow(0 0 3px rgba(108,229,177,0.5));}
@keyframes flowdash{to{stroke-dashoffset:-24;}}
.flow-dot{fill:var(--accent);opacity:0;}
.flow-dot.on{opacity:1;}
.node-g{cursor:default;}
.node-box{fill:#141b2c;stroke:#243049;stroke-width:1.5;transition:stroke .45s ease,fill .45s ease;}
.node-box.starting{stroke:var(--warn);animation:nodepulse 1.1s ease-in-out infinite;}
.node-box.live{stroke:var(--accent);fill:#12211c;}
@keyframes nodepulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.node-icon{font-size:20px;}
.node-label{fill:var(--text);font-size:12px;font-weight:600;}
.node-state{font-size:10px;font-weight:600;letter-spacing:.04em;}
.node-state.starting{fill:var(--warn);}
.node-state.live{fill:var(--accent);}
.node-appear{animation:nodeappear .5s ease both;}
@keyframes nodeappear{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.topo-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--text-muted);}
.topo-legend .k{display:inline-flex;align-items:center;gap:6px;}
.legend-swatch{width:18px;height:0;border-top:2px dashed var(--accent);}

/* ── Golden verification panel ── */
.verify-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.verify-list{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.verify-row{display:flex;gap:12px;align-items:flex-start;padding:11px 13px;border:1px solid var(--border);border-radius:8px;background:var(--panel);animation:nodeappear .35s ease both;}
.verify-row.ok{border-color:rgba(108,229,177,0.4);}
.verify-row.bad{border-color:rgba(239,96,121,0.45);}
.verify-badge{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.verify-badge.ok{background:rgba(108,229,177,0.15);color:var(--accent);}
.verify-badge.bad{background:rgba(239,96,121,0.15);color:var(--bad);}
.verify-badge.run{background:var(--panel-2);color:var(--text-muted);animation:nodepulse 1s ease-in-out infinite;}
.verify-name{font-weight:600;font-size:13px;}
.verify-detail{color:var(--text-muted);font-size:11px;margin-top:2px;}
.verify-diff{color:var(--text-muted);font-size:11px;margin-top:3px;font-family:'JetBrains Mono',monospace;}
.verify-summary{padding:12px 16px;border-radius:8px;font-weight:600;margin-top:4px;}
.verify-summary.ok{background:rgba(108,229,177,0.1);color:var(--accent);border:1px solid rgba(108,229,177,0.35);}
.verify-summary.bad{background:rgba(239,96,121,0.1);color:var(--bad);border:1px solid rgba(239,96,121,0.35);}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--text-muted);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<!-- React vendored locally (no CDN, works offline). Pre-compiled wizard.js instead of in-browser Babel. -->
<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/wizard.js"></script>
</body>
</html>
